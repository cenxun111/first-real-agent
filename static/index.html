<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent API Web Interface</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="chat-container">
        <header class="chat-header">
            <div class="header-info">
                <h1>Antigravity Web Agent</h1>
                <p>Powered by FastAPI & LiteLLM</p>
            </div>
            <div class="status-indicator">
                <span class="dot"></span> Online
            </div>
        </header>

        <div class="chat-feed" id="chatFeed">
            <div class="message system-message">
                <div class="message-bubble">
                    Welcome! I'm ready to assist you. What can I do for you today?
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="Type your message here..." rows="1" autofocus></textarea>
                <button id="sendBtn" class="send-button">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <!-- Approval Modal (Glassmorphism) -->
    <div id="approvalModal" class="modal-overlay hidden">
        <div class="glass-modal">
            <h2>⚠️ Approval Required</h2>
            <p id="approvalMessage">The agent wants to execute <strong id="approvalToolName"></strong>.</p>
            <div class="approval-args">
                <pre><code id="approvalArgs"></code></pre>
            </div>
            <div class="modal-actions">
                <button id="rejectBtn" class="btn btn-danger">Reject</button>
                <button id="approveBtn" class="btn btn-success">Approve</button>
            </div>
        </div>
    </div>

    <!-- Marked JS for parsing markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
